<body>

    <header class="main-header">

    </header>

    <main>
        <div class="hero-section" id="hero-suggestion">
            <!-- Dynamic JS HTML here -->
        </div>

        <nav class="filter-nav">
            <ul>
                <li><button class="filter-btn" data-region="Arrábida">Arrábida</button></li>
                <li><button class="filter-btn" data-region="Algarve">Algarve</button></li>
                <li><button class="filter-btn" data-region="Azores">Azores</button></li>
            </ul>
        </nav>

        <!-- spot grid -->
        <section class="beaches-section">
            <h2>Explore Destinations</h2>
            <div class="grid-container" id="beaches-grid">
                <!-- Dynamic JS HTML here -->
            </div>
        </section>
    </main>

    <!-- dynamic modal -->
    <div class="modal hidden" id="details-modal">
        <div class="modal-overlay" id="modal-close-overlay"></div>
        <div class="modal-card">
            <button class="close-btn" id="modal-close-btn">&times;</button>
            <div class="modal-content" id="modal-dynamic-content">
                <!-- Dynamic JS HTML here -->
            </div>
        </div>
    </div>
