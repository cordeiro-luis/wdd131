<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Objects (W8)</title>
    <script src="courses.js" defer></script>
</head>

<body>
    <h1 id="course-name"></h1>
    <img id="course-logo">
    <h2 id="course-code"></h2>
    <label for="section-number">Section Number</label>
    <input id="section-number" />
    <button id="enroll-student">Enroll Student</button>
    <table>
        <thead>
            <tr>
                <th>Section#</th>
                <th>Room#</th>
                <th>#Enrolled</th>
                <th>Days</th>
                <th>Instructor</th>
            </tr>
        </thead>
        <tbody id="sections"></tbody>
    </table>
</body>

</html>
