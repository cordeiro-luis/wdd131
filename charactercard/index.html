<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W8 Prove - Character Card</title>
    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="W8 Prove - Character Card">
    <meta property="og:description" content="WdDD 131 - Week 8 Prove Assignment - Character Card">
    <meta property="og:url" content="http://cordeiro-luis.github.io/wdd131/charactercard">
    <meta property="og:image" content="http://cordeiro-luis.github.io/wdd131/charactercard/images/snortleblat.webp">
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="W8 Prove - Character Card">
    <meta name="twitter:description" content="WdDD 131 - Week 8 Prove Assignment - Character Card">
    <meta name="twitter:image" content="http://cordeiro-luis.github.io/wdd131/charactercard/images/snortleblat.webp">
    <!-- One favicon (ICO works everywhere) -->
    <link rel="icon" href="images/favicon.ico?v=1">
    <!-- One Apple Touch Icon (iOS home screen) -->
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css"
        integrity="sha512-NhSC1YmyruXifcj/KFRWoC561YpHpc5Jtzgvbuzx5VozKpWvQ+4nXhPdFgmx8xqexRcpAglTj9sIBWINXa8x5w=="
        crossorigin="anonymous" referrerpolicy="no-referrer">
    <link rel="stylesheet" href="styles/styles.css">
    <script src="js/script.js" defer></script>
</head>

<body>
    <main>
        <article class="card">
            <img class="image" id="image" alt="Game character portrait">
            <h1 class="name" id="name"></h1>
            <div class="stats" aria-live="polite">
                <p><strong>Class:</strong> <span id="class"></span></p>
                <p><strong>Level:</strong> <span id="level"></span></p>
                <p><strong>Health:</strong> <span id="health"></span></p>
            </div>
            <div class="buttons">
                <button type="button" id="attack-button">Attacked</button>
                <button type="button" id="level-up-button">Level Up</button>
            </div>
        </article>
    </main>
</body>

</html>
