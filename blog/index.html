<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W05 Prove: Build a Blog part 1</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css"
        integrity="sha512-NhSC1YmyruXifcj/KFRWoC561YpHpc5Jtzgvbuzx5VozKpWvQ+4nXhPdFgmx8xqexRcpAglTj9sIBWINXa8x5w=="
        crossorigin="anonymous" referrerpolicy="no-referrer">
    <link rel="stylesheet" href="styles/style.css">
</head>

<body>
    <header>
        <h1>Kids Read For Fun</h1>
        <nav aria-label="main menu">
            <ul class="main-nav">
                <li><a href="#">About</a></li>
                <li><a href="#">Archive</a></li>
                <li><a href="#">Search</a></li>
            </ul>
        </nav>
    </header>

    <main id="main-content">
        <article class="blog-post">

            <section class="post-meta">
                <p class="date">July 5, 2022</p>
                <p class="age-range">10-14</p>
                <p class="genre">Fantasy</p>
                <p class="rating" aria-label="Rating: 4 out of 5 stars" role="img">⭐⭐⭐⭐</p>
            </section>

            <section class="post-content">
                <h2>Septimus Heap Book One: Magyk</h2>
                <img src="images/magkycover2.jpg" alt="Book cover of Septimus Heap Book One: Magyk">
                <p>
                    If you enjoy stories about seventh sons of seventh sons and magyk this
                    is the book for you.
                </p>
            </section>

        </article>
    </main>

    <footer>
        <p>Luis Cordeiro WDD 131</p>
    </footer>
</body>

</html>
